version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "../vital/migrations/"
    gen:
      go:
        package: "dbgen"
        out: "../database/dbgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
